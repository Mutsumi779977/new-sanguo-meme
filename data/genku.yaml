# ==================== 新三国世界观设定（World Building）====================
# 这些设定是理解新三国剧情扭曲的基础，与天意等元梗配合使用

梗ID: xsg_world_001
设定名: "天意/天意侵蚀"
类型: 核心世界观
描述: |
  新三国中存在一个高等存在"天意"，对世界进行干涉导致剧情偏离史实。
  天意会在重要历史节点进行世界线修正，有时直接修正事件，有时通过"天意侵蚀"
  让所有人都觉得事实与正史无异（如关羽实际只过了三关斩了四将，但所有人都觉得他过五关斩六将）。
侵蚀类型:
  - 精神错乱: 人物智力下降、记忆错乱、感官失能（如曹操时常发癫、荀彧说"徐州城不愧为中原第一雄关"）
  - 现实扭曲: 时间地点错乱（如小沛忽近忽远、新三国道）
  - 时空错乱: 出现不符合时代的事物（如"死是凉爽的夏夜"、"百分之百"、高压电网）
  - 折损寿命: 过度窥探天意或担任江东大都督会加速衰老
出处: 第20集《煮酒论英雄》刘备丢筷子时所说"迅雷乃天意，世人谁敢不畏天意"
权重: 5
录入时间: "2026-04-13"

