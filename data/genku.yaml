梗ID: xsg_cc_018
原文: "曹操盖饭 / 一介匹夫"
人物: 曹操
出处: 第12集，曹操吃饭时荀彧来报兖州被吕布偷袭，曹操愤怒盖饭；得知陈宫为军师后说"这就不奇怪了"又把饭扫回碗里
情境: 先愤怒盖饭，后恍然大悟收回——情绪反转的经典场景
情绪: [愤怒, 破防, 恍然大悟, 搞笑]
权重: 5
语义关键词: [盖饭, 破防, 愤怒, 反转, 收回, 兖州, 吕布, 陈宫, 一介匹夫, 胆识]
场景标签: [破防, 反转, 经典, 搞笑, 高频, 评论区改编]
变体: "曹操撤回了一碗盖饭"
完整台词: |
  【破防阶段】
  曹操正吃饭，荀彧来报：吕布偷袭兖州
  曹操怒盖饭："Nya！吕布一介匹夫，他哪里来的如此胆识，竟敢偷袭我的兖州！"
  
  【反转阶段】
  荀彧：是陈宫做了吕布军师
  曹操恍然大悟："这就不奇怪了，这就不奇怪了"，把饭扫回碗里
评论区改编模式:
  角色互换式: 将原句主语"吕布"换成被讨论的对象
    模板: "[角色]一介匹夫，他哪里来的如此胆识，竟敢[行为]"
    案例: "nia！曹操他一介匹夫，他哪里来的如此胆识，竟敢在水里游泳！"
  场景适配式: 替换行为部分适配当前话题
    模板: "[对象]一介匹夫，他哪里来的如此胆识，竟敢[具体行为]"
互动接龙模式:
  主梗: "[角色]一介匹夫...竟敢[行为]"
  附和: "是啊，[角色]怎么敢"（捧哏式回应，强化惊讶语气）
  反转: "哦？是[原因]？这就不奇怪了，这就不奇怪了"
备注: |
  使用场景：
  1. 先愤怒/破防，后恍然大悟/理解，情绪反转时
  2. 评论区角色互换改编：把原句套用到任意角色上
  3. 互动接龙：主梗+附和+反转三段式
  
  错误用法：
  - 单说"曹操盖饭"或"这就不奇怪了"都不完整，必须是反转场景
  - "一介匹夫"单独使用需接具体行为
引用频次: 0
effectiveness: 0
录入时间: "2026-04-13"

