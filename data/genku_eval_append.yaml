# ==================== 评价专用Meta梗（新增） ====================
# 用于多维度匹配系统，支持结构化搜索后的评价生成

梗ID: xsg_eval_praise_001
原文: "我原本以为[对象]已经[形容词]了，没想到[对象]比他还[强化形容词]！"
人物: 通用
出处: 评价递进模板
情境: 用于正面评价，递进式表达赞赏
情绪: [赞叹, 得意, 兴奋]
强度: 强
权重: 5
场景标签: [meta, 评价, 递进, 赞扬, 封神]
语义关键词: [评价, 厉害, 强, 无敌, 巅峰, 传奇, goat]
变体模板: "我原本以为[基准对象]已经[形容词]了，没想到[对象]比他还[强化形容词]！这是谁的部将？"
variable_desc:
  对象: 被评价的人/事物
  基准对象: 用于对比的标杆（如吕布、T1）
  形容词: 基础赞美词（如天下无敌、勇猛）
  强化形容词: 更强的赞美词（如勇猛、神勇、不可战胜）
融合规则:
  probability: 0.5
  前置meta: ["列位诸公", "放肆"]
  后置主梗: ["这是谁的部将", "叉出去"]
用法: 正面评价时使用，递进式强调被评价对象的优秀
录入时间: "2026-04-11"

