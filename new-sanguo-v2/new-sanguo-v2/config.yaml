# 新三国梗系统配置文件 v2.5
# 修改后重启 Agent 生效

---
# 匹配算法配置
matching:
  # 输入长度限制
  max_input_length: 2000
  
  # 温度参数（采样随机性）
  # T < 1: 更确定，偏向高分
  # T = 1: 正常分布（默认）
  # T > 1: 更随机，探索性强
  temperature: 1.0
  
  # Top N 候选数
  top_n_candidates: 5
  
  # 向量匹配相似度阈值
  min_similarity_threshold: 0.5

# 评分权重配置（可调整匹配行为）
scoring:
  weights:
    similarity: 0.6        # 语义相似度权重
    base_weight: 0.3       # 基础权重系数
    frequency: 0.001       # 频次系数
    frequency_max: 0.1     # 频次上限
    preference_person: 0.1 # 人物偏好权重
    preference_tag: 0.05   # 标签偏好权重
  
  normalization:
    weight_max: 5          # 权重归一化分母
  
  # 阈值配置（提取魔法数字）
  thresholds:
    fusion_quality: 0.7       # 融合质量阈值（低于此值视为失败）
    topic_confidence: 0.3     # 话题识别置信度阈值
    topic_confidence_high: 0.5 # 高置信度阈值
    high_freq_penalty: 0.5    # 高频梗惩罚系数阈值
  
  # 高频梗防滥用配置（事不过三定律）
  high_freq_config:
    min_weight: 5             # 纳入高频监控的最小权重
    window_seconds: 600       # 监控时间窗口（10分钟）
    max_usage_before_penalty: 3 # 事不过三：前3次正常使用
    penalty_per_use: 0.1      # 第4次起每次乘以0.1（严重惩罚）

# 向量模型配置
embedding:
  # 默认关闭，需手动开启
  # 开启后首次使用会自动下载模型（约 120MB）
  enabled: false
  
  # 模型名称
  model_name: "paraphrase-multilingual-MiniLM-L12-v2"
  
  # 延迟加载（避免启动卡顿）
  lazy_load: true

# 数据库配置
database:
  filename: "genku.db"
  yaml_source: "data/genku.yaml"
  timeout: 30

# 融合配置
fusion:
  enabled: true
  meta_prefix: "xsg_meta_"
  fusion_probability: 0.3  # 降低融合概率，避免滥用
  max_fusion_per_output: 1
  
  # 融合模板配置
  templates:
    称呼类:
      patterns: [".*爷.*", ".*哥.*", ".*姐.*"]
      templates:
        - "{称呼}爷{动作}{主梗}"
        - "{称呼}爷表示{主梗}"
        - "{称呼}爷认为{主梗}"
      actions: ["真是", "堪称", "可谓是", "那就是", "实乃"]
    
    宣告类:
      patterns: ["从这一刻起.*", "历史.*"]
      templates:
        - "{meta}，{主梗}"
    
    开场类:
      patterns: ["列位诸公.*", "各位.*"]
      templates:
        - "{meta}，{主梗}"
    
    默认:
      templates:
        - "{meta}，{主梗}"

# 对话配置
dialogue:
  context_turns: 5
  auto_reply_probability: 0.8
  fallback_replies:
    - "这句话有意思，但我还没学到对应的梗。要教教我吗？发送 /录入"
    - "你说的这个场景我还不会接，试试 /玩梗 手动触发？"
    - "（默默记下）你说的是：{text}..."
    - "有趣，让我查查怎么接... 算了没查到😅"
  
  # 上下文记忆增强配置
  context_memory:
    enabled: true
    max_history: 10           # 保存最近N轮对话
    person_affinity_decay: 0.8 # 人物关联度衰减（多轮后降低同人物概率）
    tag_affinity_decay: 0.9    # 标签关联度衰减
    avoid_repeat_window: 5    # 避免重复梗的窗口期（轮数）
  
  # 多轮梗接龙配置
  genku_chain:
    enabled: true
    trigger_probability: 0.6  # 检测到可接龙时触发概率
    max_chain_length: 3       # 最大接龙长度（防止过度）
    cooldown_turns: 3         # 接龙后冷却轮数
    # 接龙模式配置
    patterns:
      # 模式1: 递进式（不可能 → 绝对不可能）
      progressive:
        enabled: true
        keywords: ["不可能", "绝对", "完全", "根本"]
      # 模式2: 反转式（曹操盖饭 → 撤回 → 这就不奇怪了）
      reversal:
        enabled: true
        sequences:
          - ["曹操盖饭", "撤回盖饭", "这就不奇怪了"]
          - ["威胁", "列位诸公", "告老还乡"]
      # 模式3: 问答式
      qa:
        enabled: true
        trigger_patterns: ["为什么", "怎么办", "那", "然后呢"]

# 用户学习配置
learning:
  enabled: true
  min_interactions: 3
  preference_decay: 0.9

# 变体生成配置
variant:
  patterns:
    object:
      - "不想(.*?)了"
      - "不要(.*?)了"
      - "拒绝(.*?)"
      - "别(.*?)了"
      - "今天(.*?)"
  
  defaults:
    对象: "这件事"
    否定词: "不可能"
    动作1: "奏乐"
    动作2: "舞"
    称呼: "楼主"
    环境: "乱世"

# 搜索增强配置
search:
  # 是否启用联网搜索
  enabled: true
  
  # 触发条件：匹配分数低于此值时触发搜索
  # 提高阈值，减少不必要的搜索（原来是0.3）
  trigger_threshold: 0.5
  
  # 搜索结果数量
  result_count: 3
  
  # 搜索后重试匹配
  retry_match_after_search: true
  
  # 缓存搜索结果（秒）
  cache_ttl: 3600
  level: "INFO"
  file: ""
  show_timestamp: true
